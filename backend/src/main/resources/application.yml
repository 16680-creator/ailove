server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-love-daily

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ai_love_daily}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

wx:
  appid: ${WX_APPID:}
  secret: ${WX_SECRET:}

jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:2592000}

file:
  upload:
    path: ${FILE_UPLOAD_PATH:${user.dir}/uploads}
  access:
    url: ${FILE_ACCESS_URL:/uploads}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.ailovedaily: debug
    org.springframework.web: info

knife4j:
  enable: true

ai:
  enabled: ${AI_ENABLED:false}
  api-url: ${AI_API_URL:https://api.minimax.chat/v1/text/chatcompletion_v2}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:MiniMax-M2.7}
  timeout: ${AI_TIMEOUT:300000}
